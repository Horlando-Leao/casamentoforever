<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#faf5ff"/>
  <!-- Main Body -->
  <rect x="80" y="100" width="240" height="140" rx="15" fill="#e9d5ff"/>
  <rect x="90" y="110" width="220" height="120" rx="10" fill="#ffffff"/>
  <!-- Door window -->
