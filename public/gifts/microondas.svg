  <rect x="245" y="120" width="55" height="100" rx="5" fill="#f3e8ff"/>
  <rect x="255" y="130" width="35" height="20" rx="3" fill="#0f172a"/>
  <text x="272.5" y="145" font-family="monospace" font-size="12" fill="#22c55e" text-anchor="middle" font-weight="bold">1:30</text>
  <!-- Buttons -->
  <circle cx="262" cy="165" r="4" fill="#a855f7"/>
  <circle cx="282" cy="165" r="4" fill="#a855f7"/>
  <circle cx="262" cy="180" r="4" fill="#a855f7"/>
  <circle cx="282" cy="180" r="4" fill="#a855f7"/>
  <rect x="260" y="195" width="25" height="15" rx="3" fill="#d8b4fe"/>
