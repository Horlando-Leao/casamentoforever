<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f8fafc"/>
  <!-- Napkin/Mat -->
  <rect x="120" y="80" width="160" height="140" rx="10" fill="#e2e8f0" transform="rotate(-5 200 150)"/>
  
  <!-- Fork -->
  <g transform="translate(140, 90) rotate(5)">
    <!-- Handle -->
    <rect x="15" y="40" width="10" height="80" rx="5" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
    <!-- Head -->
    <path d="M10 40 Q20 50 30 40 L30 10 Q30 5 25 5 L15 5 Q10 5 10 10 Z" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
    <!-- Tines -->
    <line x1="15" y1="5" x2="15" y2="25" stroke="#f8fafc" stroke-width="2"/>
    <line x1="20" y1="5" x2="20" y2="25" stroke="#f8fafc" stroke-width="2"/>
    <line x1="25" y1="5" x2="25" y2="25" stroke="#f8fafc" stroke-width="2"/>
  </g>

  <!-- Knife -->
  <g transform="translate(190, 90) rotate(5)">
    <!-- Handle -->
    <rect x="15" y="40" width="10" height="80" rx="5" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
    <!-- Blade -->
    <path d="M15 40 Q15 10 20 5 Q25 10 25 40 Z" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
  </g>

  <!-- Spoon -->
  <g transform="translate(240, 90) rotate(5)">
    <!-- Handle -->
    <rect x="15" y="40" width="10" height="80" rx="5" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
    <!-- Bowl -->
    <ellipse cx="20" cy="25" rx="12" ry="20" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
    <ellipse cx="18" cy="20" rx="4" ry="8" fill="#f8fafc" opacity="0.5" transform="rotate(-15 18 20)"/>
  </g>
</svg>
