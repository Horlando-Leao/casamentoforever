<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#fff1f2"/>
  <!-- Bed Base -->
  <rect x="100" y="180" width="200" height="40" rx="5" fill="#fecdd3"/>
  <rect x="90" y="170" width="220" height="20" rx="5" fill="#fda4af"/>
  <!-- Mattress / Sheet -->
  <rect x="100" y="140" width="200" height="30" rx="8" fill="#ffffff"/>
  <!-- Folded blanket -->
  <path d="M100 140 Q200 120 300 140 L300 170 L100 170 Z" fill="#fecdd3"/>
  <!-- Pillows -->
  <rect x="120" y="100" width="70" height="40" rx="8" fill="#ffffff" transform="rotate(-5 120 100)"/>
  <rect x="210" y="100" width="70" height="40" rx="8" fill="#ffffff" transform="rotate(5 210 100)"/>
  <!-- Sleep Zzz -->
  <path d="M260 80 L280 80 L260 60 L280 60" stroke="#fb7185" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M290 60 L305 60 L290 45 L305 45" stroke="#fb7185" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>
