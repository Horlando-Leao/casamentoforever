<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f0fdf4"/>
  <!-- Base -->
  <path d="M160 200 L240 200 L250 250 Q250 260 240 260 L160 260 Q150 260 150 250 Z" fill="#374151"/>
  <!-- Dial -->
  <circle cx="200" cy="230" r="15" fill="#9ca3af"/>
  <circle cx="200" cy="230" r="10" fill="#4b5563"/>
  <line x1="200" y1="230" x2="200" y2="220" stroke="#f3f4f6" stroke-width="3" stroke-linecap="round"/>
  <!-- Pitcher -->
  <path d="M170 100 L230 100 L215 200 L185 200 Z" fill="#dcfce7" opacity="0.8"/>
  <path d="M170 100 L230 100 L215 200 L185 200 Z" stroke="#86efac" stroke-width="4" fill="none"/>
  <!-- Liquid inside -->
  <path d="M175 140 Q200 130 225 140 L215 200 L185 200 Z" fill="#4ade80"/>
  <!-- Lid -->
  <rect x="160" y="80" width="80" height="20" rx="5" fill="#374151"/>
  <rect x="180" y="70" width="40" height="10" rx="3" fill="#9ca3af"/>
  <!-- Handle -->
  <path d="M225 120 C260 120 260 180 220 180" stroke="#86efac" stroke-width="6" fill="none" stroke-linecap="round"/>
</svg>
